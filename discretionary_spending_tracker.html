
<h2 class="sr-only">Discretionary spending tracker for April 2026 — Kansas City</h2>

<div id="app" style="position: relative; min-height: 640px; padding: 0 0 1.5rem;">

<div id="overlay" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; min-height:640px; background:rgba(0,0,0,0.45); z-index:10; align-items:center; justify-content:center; border-radius: var(--border-radius-lg);">
  <div id="modal-box" style="background:var(--color-background-primary); border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-lg); padding:1.5rem; width:340px;">
    <p style="font-size:15px; font-weight:500; margin-bottom:1rem;" id="modal-title">Add category</p>
    <div id="modal-body"></div>
    <div style="display:flex; gap:8px; margin-top:1.25rem;">
      <button id="modal-confirm" style="flex:1; padding:8px;">Confirm</button>
      <button onclick="closeModal()" style="flex:1; padding:8px;">Cancel</button>
    </div>
  </div>
</div>

<div style="display:flex; align-items:center; justify-content:space-between; padding:1rem 0 1.25rem; border-bottom:0.5px solid var(--color-border-tertiary); margin-bottom:1.25rem; flex-wrap:wrap; gap:8px;">
  <div>
    <p style="font-size:15px; font-weight:500; color:var(--color-text-primary); margin:0;">Discretionary tracker</p>
    <p style="font-size:13px; color:var(--color-text-secondary); margin:0;">April 2026 &nbsp;·&nbsp; Kansas City</p>
  </div>
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <button onclick="showAddCat()" style="font-size:13px; padding:6px 12px;">+ Category</button>
    <button onclick="showQuickLog()" style="font-size:13px; padding:6px 12px;">Quick log</button>
    <button onclick="doReset()" style="font-size:13px; padding:6px 12px; color:var(--color-text-danger);">Reset month</button>
    <button onclick="doExport()" style="font-size:13px; padding:6px 12px;">Export CSV</button>
  </div>
</div>

<div id="summary-cards" style="display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-bottom:1.5rem;"></div>

<div style="overflow-x:auto;">
<table id="main-table" style="width:100%; border-collapse:collapse; font-size:13px; table-layout:fixed;">
  <colgroup>
    <col style="width:26%">
    <col style="width:14%">
    <col style="width:20%">
    <col style="width:9%">
    <col style="width:9%">
    <col style="width:9%">
    <col style="width:13%">
  </colgroup>
  <thead>
    <tr style="border-bottom:0.5px solid var(--color-border-secondary);">
      <th style="text-align:left; padding:8px 6px 10px; font-weight:500; color:var(--color-text-secondary);">Category</th>
      <th style="text-align:left; padding:8px 6px 10px; font-weight:500; color:var(--color-text-secondary);">Card</th>
      <th style="padding:8px 6px 10px; font-weight:500; color:var(--color-text-secondary);">Progress</th>
      <th style="text-align:right; padding:8px 6px 10px; font-weight:500; color:var(--color-text-secondary);">Budget</th>
      <th style="text-align:right; padding:8px 6px 10px; font-weight:500; color:var(--color-text-secondary);">Spent</th>
      <th style="text-align:right; padding:8px 6px 10px; font-weight:500; color:var(--color-text-secondary);">Left</th>
      <th style="text-align:right; padding:8px 6px 10px; font-weight:500; color:var(--color-text-secondary);">Actions</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>
</div>

<div id="totals-row" style="display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-top:1.25rem; padding-top:1.25rem; border-top:0.5px solid var(--color-border-secondary);"></div>

</div>

<style>
#main-table tbody tr { border-bottom: 0.5px solid var(--color-border-tertiary); }
#main-table tbody tr:last-child { border-bottom: none; }
#main-table td { padding: 10px 6px; vertical-align: middle; }
.pbar-wrap { background: var(--color-border-tertiary); height: 5px; border-radius: 3px; overflow: hidden; width: 100%; }
.pbar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.card-badge { display:inline-block; font-size:11px; font-weight:500; padding:2px 7px; border-radius:var(--border-radius-md); background:var(--color-background-secondary); color:var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }
.mono { font-family: var(--font-mono); }
.del-btn { background:none; border:none; color:var(--color-text-danger); font-size:15px; cursor:pointer; padding:0 4px; opacity:0.6; }
.del-btn:hover { opacity:1; }
.add-btn { font-size:11px; padding:3px 8px; }
</style>

<script>
var cats = [
  { id:1, name:"Groceries", sub:"Aldi, Hen House, TJ's", card:"Savor 3.0%", budget:600, spent:0 },
  { id:2, name:"Eating out", sub:"Chipotle, Taco Bell, The Peanut", card:"Savor 3.0%", budget:300, spent:0 },
  { id:3, name:"Gas & charging", sub:"Gas / Tesla Supercharging", card:"Cash+ 2.0%", budget:120, spent:0 },
  { id:4, name:"Amazon", sub:"No bonus category applies", card:"Cash+ 1.0%", budget:75, spent:0 },
  { id:5, name:"Household", sub:"Target / Walmart supplies", card:"Cash+ 1.0%", budget:75, spent:0 },
  { id:6, name:"Alcohol", sub:"Bar/restaurant = 3%; liquor store = 1%", card:"Savor 3.0%", budget:30, spent:0 },
  { id:7, name:"School — Finn", sub:"Likely 1% unless qualifying merchant", card:"Cash+ 1.0%", budget:20, spent:0 },
  { id:8, name:"Fun", sub:"Movies, concerts, tickets", card:"Savor 3.0%", budget:50, spent:0 },
  { id:9, name:"Work snacks", sub:"3% fast food; 1% grocery", card:"Savor 3.0%", budget:20, spent:0 }
];
var nextId = 10;

function getRate(card) {
  var m = card.match(/(\d+\.?\d*)/);
  return m ? parseFloat(m[1]) : 1;
}
function rewards(spent, card) {
  return Math.round(spent * getRate(card)) / 100;
}
function pct(cat) {
  return cat.budget > 0 ? Math.min(100, Math.round(cat.spent / cat.budget * 100)) : 0;
}
function barColor(p) {
  if (p >= 100) return '#E24B4A';
  if (p >= 80) return '#EF9F27';
  return '#1D9E75';
}
function fmt(n) { return '$' + n.toFixed(2); }

function renderSummary() {
  var tb = 0, ts = 0, tr = 0;
  cats.forEach(function(c){ tb += c.budget; ts += c.spent; tr += rewards(c.spent, c.card); });
  var rem = tb - ts;
  var cards = [
    { label:'Total budget', val:fmt(tb), color:'var(--color-text-primary)' },
    { label:'Spent so far', val:fmt(ts), color:'var(--color-text-primary)' },
    { label:'Remaining', val:fmt(rem), color: rem >= 0 ? '#1D9E75' : '#E24B4A' },
    { label:'Est. rewards', val:fmt(tr), color:'#185FA5' }
  ];
  var el = document.getElementById('summary-cards');
  el.innerHTML = cards.map(function(c){
    return '<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.85rem 1rem;">'
      + '<p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 4px;">' + c.label + '</p>'
      + '<p class="mono" style="font-size:20px;font-weight:500;margin:0;color:'+c.color+';">' + c.val + '</p>'
      + '</div>';
  }).join('');
}

function renderTable() {
  var tbody = document.getElementById('table-body');
  tbody.innerHTML = cats.map(function(c){
    var p = pct(c);
    var rem = c.budget - c.spent;
    var rew = rewards(c.spent, c.card);
    var remColor = rem >= 0 ? '#1D9E75' : '#E24B4A';
    return '<tr>'
      + '<td><p style="font-weight:500;font-size:13px;margin:0;color:var(--color-text-primary);">' + c.name + '</p>'
      + '<p style="font-size:11px;color:var(--color-text-secondary);margin:2px 0 0;">' + c.sub + '</p></td>'
      + '<td><span class="card-badge">' + c.card + '</span></td>'
      + '<td style="padding-right:8px;">'
      + '<div style="display:flex;align-items:center;gap:6px;">'
      + '<div class="pbar-wrap" style="flex:1;"><div class="pbar-fill" style="width:'+p+'%;background:'+barColor(p)+';"></div></div>'
      + '<span class="mono" style="font-size:11px;color:var(--color-text-secondary);min-width:28px;text-align:right;">'+p+'%</span>'
      + '</div></td>'
      + '<td class="mono" style="text-align:right;color:var(--color-text-secondary);">' + fmt(c.budget) + '</td>'
      + '<td class="mono" style="text-align:right;color:var(--color-text-primary);">' + fmt(c.spent) + '</td>'
      + '<td class="mono" style="text-align:right;color:'+remColor+';">' + fmt(rem) + '</td>'
      + '<td style="text-align:right;">'
      + '<button class="add-btn" onclick="quickAdd('+c.id+')">+ Add</button>'
      + '<button class="del-btn" onclick="delCat('+c.id+')" title="Delete">×</button>'
      + '</td>'
      + '</tr>';
  }).join('');
  renderSummary();
  renderTotals();
}

function renderTotals() {
  var tb = 0, ts = 0, tr = 0;
  cats.forEach(function(c){ tb += c.budget; ts += c.spent; tr += rewards(c.spent, c.card); });
  var rem = tb - ts;
  var items = [
    { label:'Total budget', val:fmt(tb), color:'var(--color-text-secondary)' },
    { label:'Total spent', val:fmt(ts), color:'var(--color-text-primary)' },
    { label:'Total remaining', val:fmt(rem), color: rem >= 0 ? '#1D9E75' : '#E24B4A' },
    { label:'Total est. rewards', val:fmt(tr), color:'#185FA5' }
  ];
  document.getElementById('totals-row').innerHTML = items.map(function(i){
    return '<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.6rem 1rem;display:flex;justify-content:space-between;align-items:center;">'
      + '<span style="font-size:12px;color:var(--color-text-secondary);">' + i.label + '</span>'
      + '<span class="mono" style="font-size:13px;font-weight:500;color:'+i.color+';">' + i.val + '</span>'
      + '</div>';
  }).join('');
}

function quickAdd(id) {
  var cat = cats.find(function(c){ return c.id === id; });
  if (!cat) return;
  document.getElementById('modal-title').textContent = 'Add spend — ' + cat.name;
  document.getElementById('modal-body').innerHTML =
    '<p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 6px;">Current: ' + fmt(cat.spent) + ' of ' + fmt(cat.budget) + '</p>'
    + '<input type="number" id="ma-amount" step="0.01" min="0" placeholder="Amount" style="width:100%;margin-bottom:8px;" autofocus>'
    + '<input type="text" id="ma-note" placeholder="Optional note" style="width:100%;">';
  document.getElementById('modal-confirm').onclick = function(){
    var v = parseFloat(document.getElementById('ma-amount').value);
    if (isNaN(v) || v <= 0) return;
    cat.spent = Math.round((cat.spent + v) * 100) / 100;
    closeModal(); renderTable();
  };
  openModal();
  setTimeout(function(){ var el = document.getElementById('ma-amount'); if(el) el.focus(); }, 50);
}

function showAddCat() {
  document.getElementById('modal-title').textContent = 'Add category';
  document.getElementById('modal-body').innerHTML =
    '<input type="text" id="nc-name" placeholder="Category name" style="width:100%;margin-bottom:8px;" autofocus>'
    + '<input type="text" id="nc-card" placeholder="Card / rate  (e.g. Savor 3.0%)" style="width:100%;margin-bottom:8px;">'
    + '<input type="number" id="nc-budget" placeholder="Monthly budget" value="50" style="width:100%;">';
  document.getElementById('modal-confirm').onclick = function(){
    var name = document.getElementById('nc-name').value.trim();
    if (!name) return;
    cats.push({ id:nextId++, name:name, sub:'', card:document.getElementById('nc-card').value.trim() || 'Cash+ 1.0%',
      budget:parseFloat(document.getElementById('nc-budget').value) || 50, spent:0 });
    closeModal(); renderTable();
  };
  openModal();
  setTimeout(function(){ var el = document.getElementById('nc-name'); if(el) el.focus(); }, 50);
}

function showQuickLog() {
  document.getElementById('modal-title').textContent = 'Quick log transaction';
  var opts = cats.map(function(c){ return '<option value="'+c.id+'">'+c.name+'</option>'; }).join('');
  document.getElementById('modal-body').innerHTML =
    '<select id="ql-cat" style="width:100%;margin-bottom:8px;">' + opts + '</select>'
    + '<input type="number" id="ql-amount" step="0.01" min="0" placeholder="Amount" style="width:100%;">';
  document.getElementById('modal-confirm').onclick = function(){
    var id = parseInt(document.getElementById('ql-cat').value);
    var v = parseFloat(document.getElementById('ql-amount').value);
    if (isNaN(v) || v <= 0) return;
    var cat = cats.find(function(c){ return c.id === id; });
    if (cat) { cat.spent = Math.round((cat.spent + v) * 100) / 100; }
    closeModal(); renderTable();
  };
  openModal();
}

function delCat(id) {
  var cat = cats.find(function(c){ return c.id === id; });
  if (!cat) return;
  document.getElementById('modal-title').textContent = 'Delete category';
  document.getElementById('modal-body').innerHTML =
    '<p style="font-size:13px;color:var(--color-text-secondary);">Remove <strong style="color:var(--color-text-primary);">' + cat.name + '</strong>? This can\'t be undone.</p>';
  document.getElementById('modal-confirm').textContent = 'Delete';
  document.getElementById('modal-confirm').style.color = 'var(--color-text-danger)';
  document.getElementById('modal-confirm').onclick = function(){
    cats = cats.filter(function(c){ return c.id !== id; });
    document.getElementById('modal-confirm').textContent = 'Confirm';
    document.getElementById('modal-confirm').style.color = '';
    closeModal(); renderTable();
  };
  openModal();
}

function doReset() {
  document.getElementById('modal-title').textContent = 'Reset month';
  document.getElementById('modal-body').innerHTML =
    '<p style="font-size:13px;color:var(--color-text-secondary);">Zero out all spending for the new month? Budgets and categories stay — only spent amounts reset.</p>';
  document.getElementById('modal-confirm').onclick = function(){
    cats.forEach(function(c){ c.spent = 0; });
    closeModal(); renderTable();
  };
  openModal();
}

function doExport() {
  var csv = 'Category,Card,Budget,Spent,Remaining,Est. Rewards\n';
  cats.forEach(function(c){
    var rem = c.budget - c.spent;
    var rew = rewards(c.spent, c.card);
    csv += '"'+c.name+'","'+c.card+'",'+c.budget.toFixed(2)+','+c.spent.toFixed(2)+','+rem.toFixed(2)+','+rew.toFixed(2)+'\n';
  });
  var blob = new Blob([csv], { type:'text/csv' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'discretionary-april-2026.csv'; a.click();
  URL.revokeObjectURL(url);
}

function openModal() {
  var o = document.getElementById('overlay');
  o.style.display = 'flex';
}
function closeModal() {
  document.getElementById('overlay').style.display = 'none';
}

renderTable();
</script>
